<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

/* ====== Supabase 설정 ====== */
const SUPABASE_URL = "https://fhdwwqlvosbjonrenpqz.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoZHd3cWx2b3Niam9ucmVucHF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMTk4NzYsImV4cCI6MjA5NTg5NTg3Nn0.JgUEKxDRioqKvhSaOPxJMH9tuo0wdFv0-kkc0s5mJ8U";
const EMAIL_DOMAIN = "mathroom.app";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const emailOf = (id) => `${String(id).trim().toLowerCase()}@${EMAIL_DOMAIN}`;
const padPw = (pw) => String(pw) + "__mr__";

const mapColumn = (r) => ({
  id: r.id, title: r.title, body: r.body || "", author: r.author || "",
  isDraft: !!r.is_draft, category: r.category || "elem", sortOrder: r.sort_order || 0,
  createdAt: r.created_at ? Date.parse(r.created_at) : 0,
});
const mapExam = (r) => ({
  id: r.id, title: r.title, questions: r.questions || [],
  author: r.author || "", authorId: r.author_id || null,
  examType: r.exam_type || "level",
  publishAt: r.publish_at ? Date.parse(r.publish_at) : null,
  createdAt: r.created_at ? Date.parse(r.created_at) : 0,
});
const mapSub = (r) => ({
  id: r.id, examId: r.exam_id, student: r.student, answers: r.answers || {},
  manualScores: r.manual_scores || {}, graded: !!r.graded,
  submittedAt: r.submitted_at ? Date.parse(r.submitted_at) : 0,
});
const mapProfile = (r) => ({
  username: r.username, kakaoId: r.kakao_id || "", isAdmin: !!r.is_admin,
  createdAt: r.created_at ? Date.parse(r.created_at) : 0,
});

const uid = () => Math.random().toString(36).slice(2, 10);
const fmtDate = (ts) => {
  const d = new Date(ts);
  return `${d.getMonth() + 1}.${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(
    d.getMinutes()
  ).padStart(2, "0")}`;
};

function maxScore(exam) {
  return exam.questions.reduce((s, q) => s + (Number(q.points) || 0), 0);
}
function isShortCorrect(q, ans) {
  const key = String(q.accept ?? "").trim();
  if (key === "") return false;
  return String(ans ?? "").trim() === key;
}
function questionScore(q, sub) {
  const a = sub.answers[q.id];
  const ov = sub.manualScores?.[q.id];
  if (ov !== undefined && ov !== null && ov !== "") {
    return Math.max(0, Math.min(Number(q.points) || 0, Number(ov) || 0));
  }
  if (q.type === "mc") return a === q.answer ? Number(q.points) || 0 : 0;
  return isShortCorrect(q, a) ? Number(q.points) || 0 : 0;
}
function autoScore(exam, answers) {
  return exam.questions.reduce((s, q) => {
    if (q.type === "mc") return s + (answers[q.id] === q.answer ? Number(q.points) || 0 : 0);
    return s + (isShortCorrect(q, answers[q.id]) ? Number(q.points) || 0 : 0);
  }, 0);
}
function totalScore(exam, sub) {
  return exam.questions.reduce((s, q) => s + questionScore(q, sub), 0);
}
// 한 문항을 '맞춤'으로 볼지 (회원정답률 계산용) — 자동 정답 또는 보정으로 만점인 경우
function isQCorrect(q, sub) {
  if (q.type === "mc") return sub.answers[q.id] === q.answer;
  const ov = sub.manualScores && sub.manualScores[q.id];
  if (ov !== undefined && ov !== null && ov !== "") return Number(ov) >= (Number(q.points) || 0) && (Number(q.points) || 0) > 0;
  return isShortCorrect(q, sub.answers[q.id]);
}
// 표시용 이름: 현재 회원 목록에 없으면 '탈퇴한 회원 (원래아이디)'
function studentName(name, users) {
  if (!name) return "익명";
  if (users && users.some((u) => u.username === name)) return name;
  return "탈퇴한 회원 (" + name + ")";
}
// 정답률 구간별 색
function rateColor(rate) {
  if (rate === null || rate === undefined) return "#8B95A1"; // 데이터 없음(회색)
  if (rate >= 80) return "#00B262"; // 초록
  if (rate >= 50) return "#E5A300"; // 노랑
  if (rate >= 20) return "#F97316"; // 주황
  if (rate >= 10) return "#F04452"; // 빨강
  return "#6A0012"; // 10% 미만: 가장 어려운 색(짙은 빨강)
}

/* ============================================================ */
function App() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("home");
  const [readColIds, setReadColIds] = useState(() => getReadColIds());
  const [readExamIds, setReadExamIds] = useState(() => getReadExamIds());
  const markColumnRead = (id) => {
    setReadColIds((prev) => {
      if (prev.has(id)) return prev;
      const next = new Set(prev);
      next.add(id);
      saveReadColIds(next);
      return next;
    });
    // 회원이면 서버에도 조용히 기록 (표시는 위에서 즉시 반영됨)
    if (auth) {
      sb.from("column_reads")
        .upsert({ user_id: auth.id, column_id: id }, { onConflict: "user_id,column_id" })
        .then(() => {}, () => {});
    }
  };
  const markExamRead = (id) => {
    setReadExamIds((prev) => {
      if (prev.has(id)) return prev;
      const next = new Set(prev);
      next.add(id);
      saveReadExamIds(next);
      return next;
    });
    if (auth) {
      sb.from("exam_reads")
        .upsert({ user_id: auth.id, exam_id: id }, { onConflict: "user_id,exam_id" })
        .then(() => {}, () => {});
    }
  };
  useEffect(() => {
    try { window.scrollTo(0, 0); } catch (e) {}
  }, [tab]);
  const [auth, setAuth] = useState(null);
  // 로그인하면 서버의 칼럼 읽음 기록을 불러와 로컬과 합침 (기기 간 동기화)
  useEffect(() => {
    if (!auth) return;
    (async () => {
      try {
        const { data } = await sb.from("column_reads").select("column_id").eq("user_id", auth.id);
        if (data && data.length) {
          setReadColIds((prev) => {
            const next = new Set(prev);
            data.forEach((r) => next.add(r.column_id));
            saveReadColIds(next);
            return next;
          });
        }
      } catch (e) {}
    })();
  }, [auth]);
  // 로그인하면 서버의 시험 확인 기록도 불러와 합침
  useEffect(() => {
    if (!auth) return;
    (async () => {
      try {
        const { data } = await sb.from("exam_reads").select("exam_id").eq("user_id", auth.id);
        if (data && data.length) {
          setReadExamIds((prev) => {
            const next = new Set(prev);
            data.forEach((r) => next.add(r.exam_id));
            saveReadExamIds(next);
            return next;
          });
        }
      } catch (e) {}
    })();
  }, [auth]);
  const [authOpen, setAuthOpen] = useState(false);
  const [users, setUsers] = useState([]);
  const [notices, setNotices] = useState([]);
  const [exams, setExams] = useState([]);
  const [subs, setSubs] = useState([]);
  // 이미 제출한 시험은 '확인함'으로 간주 (빨간 점 제거)
  useEffect(() => {
    if (!auth || !auth.username) return;
    subs.forEach((s) => {
      if (s.student === auth.username && !readExamIds.has(s.examId)) markExamRead(s.examId);
    });
  }, [subs, auth]);
  const [auditLog, setAuditLog] = useState([]);
  const [guestSubs, setGuestSubs] = useState([]);

  const role = auth && auth.isAdmin ? "admin" : "student";
  const student = auth ? auth.username : "";
  const loggedIn = !!auth;
  const requireLogin = () => setAuthOpen(true);

  const loadProfile = async (userId) => {
    let res = await sb.from("profiles").select("*").eq("id", userId).maybeSingle();
    let data = res.data;
    if (!data) {
      const u = await sb.auth.getUser();
      const usr = u.data && u.data.user;
      const meta = (usr && usr.user_metadata) || {};
      const email = (usr && usr.email) || "";
      const uname = meta.username || email.split("@")[0] || "user";
      await sb.from("profiles").insert({ id: userId, username: uname, kakao_id: meta.kakao_id || "", is_admin: false });
      res = await sb.from("profiles").select("*").eq("id", userId).maybeSingle();
      data = res.data;
    }
    return data ? { ...mapProfile(data), id: data.id } : null;
  };

  const refresh = useCallback(async () => {
    try {
      const [c, e, s, p] = await Promise.all([
        sb.from("columns").select("*").order("created_at", { ascending: false }),
        sb.from("exams").select("*").order("created_at", { ascending: false }),
        sb.from("submissions").select("*").order("submitted_at", { ascending: false }),
        sb.from("profiles").select("*").order("created_at", { ascending: false }),
      ]);
      setNotices((c.data || []).map(mapColumn));
      setExams((e.data || []).map(mapExam));
      setSubs((s.data || []).map(mapSub));
      setUsers((p.data || []).map(mapProfile));
    } catch (err) {
      console.warn("데이터 불러오기 실패:", err);
    }
    // 활동 기록은 관리자만 읽을 수 있으니 따로 불러온다 (실패해도 칼럼·시험엔 영향 없음)
    try {
      const l = await sb.from("audit_log").select("*").order("created_at", { ascending: false }).limit(300);
      setAuditLog(l.data || []);
    } catch (err) {
      setAuditLog([]);
    }
    // 비회원 익명 집계(관리자만 읽힘)
    try {
      const g = await sb.from("guest_submissions").select("*").order("created_at", { ascending: false }).limit(5000);
      setGuestSubs(g.data || []);
    } catch (err) {
      setGuestSubs([]);
    }
  }, []);

  useEffect(() => {
    let active = true;
    const safety = setTimeout(() => active && setLoading(false), 5000);
    (async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (active && session && session.user) {
          const p = await loadProfile(session.user.id);
          if (active) setAuth(p);
        }
      } catch (err) {
        console.warn("세션 확인 실패:", err);
      }
      if (active) setLoading(false);
      clearTimeout(safety);
      refresh();
    })();
    const { data: listener } = sb.auth.onAuthStateChange((_evt, session) => {
      setTimeout(async () => {
        if (session && session.user) {
          const p = await loadProfile(session.user.id);
          if (p) setAuth(p);
        } else {
          setAuth(null);
        }
        refresh();
      }, 0);
    });
    return () => {
      active = false;
      clearTimeout(safety);
      listener.subscription.unsubscribe();
    };
  }, [refresh]);

  const currentId = async () => {
    const { data } = await sb.auth.getUser();
    return data && data.user ? data.user.id : null;
  };

  /* ---- 인증 ---- */
  const onLogin = async (id, pw) => {
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email: emailOf(id), password: padPw(pw) });
      if (error || !data || !data.user) return { error: "아이디 또는 비밀번호가 올바르지 않아요." };
      setAuth({ id: data.user.id, username: id.trim(), kakaoId: "", isAdmin: false });
      setAuthOpen(false);
      loadProfile(data.user.id).then((p) => { if (p) setAuth(p); }).catch(() => {});
      return {};
    } catch (e) {
      console.warn("login error:", e);
      return { error: "로그인 중 오류가 났어요. 잠시 후 다시 시도해 주세요." };
    }
  };
  const onSignup = async (id, pw, kakao) => {
    const uname = id.trim();
    if (!uname) return { error: "아이디를 입력하세요." };
    try {
      const { data, error } = await sb.auth.signUp({
        email: emailOf(uname),
        password: padPw(pw),
        options: { data: { username: uname, kakao_id: (kakao || "").trim() } },
      });
      if (error) {
        const dup = /registered|already|exists|duplicate/i.test(error.message || "");
        return { error: dup ? "이미 사용 중인 아이디예요." : error.message };
      }
      if (!data || !data.session || !data.user) {
        return { error: "가입은 됐어요. 로그인이 안 되면 Supabase에서 'Confirm email'을 꺼주세요." };
      }
      setAuth({ id: data.user.id, username: uname, kakaoId: (kakao || "").trim(), isAdmin: false });
      setAuthOpen(false);
      loadProfile(data.user.id).then((p) => { if (p) setAuth(p); }).catch(() => {});
      return {};
    } catch (e) {
      console.warn("signup error:", e);
      return { error: "가입 중 오류가 났어요. 잠시 후 다시 시도해 주세요." };
    }
  };
  const onLogout = async () => {
    await sb.auth.signOut();
    setTab("home");
  };
  const onChangePassword = async (curPw, newPw) => {
    if (!auth) return { error: "로그인이 필요해요." };
    const check = await sb.auth.signInWithPassword({ email: emailOf(auth.username), password: padPw(curPw) });
    if (check.error) return { error: "현재 비밀번호가 올바르지 않아요." };
    const { error } = await sb.auth.updateUser({ password: padPw(newPw) });
    if (error) return { error: error.message };
    return {};
  };
  const onUpdateKakao = async (kakao) => {
    if (!auth) return { error: "로그인이 필요해요." };
    const { error } = await sb.from("profiles").update({ kakao_id: kakao }).eq("id", auth.id);
    if (error) return { error: error.message };
    setAuth({ ...auth, kakaoId: kakao });
    await refresh();
    return {};
  };
  const onDeleteMe = async (pw) => {
    if (!auth) return { error: "로그인이 필요해요." };
    const check = await sb.auth.signInWithPassword({ email: emailOf(auth.username), password: padPw(pw) });
    if (check.error) return { error: "비밀번호가 올바르지 않아요." };
    const { error } = await sb.rpc("delete_my_account");
    if (error) return { error: error.message };
    await sb.auth.signOut();
    setAuth(null);
    return {};
  };

  /* ---- 데이터 ---- */
  const logAction = async (action, target) => {
    try {
      await sb.from("audit_log").insert({
        actor: auth ? auth.username : "?",
        actor_id: auth ? auth.id : null,
        action,
        target: target || "",
      });
    } catch (e) {
      console.warn("로그 기록 실패:", e);
    }
  };
  const onAddColumn = async (post) => {
    const id = await currentId();
    const { data, error } = await sb.from("columns")
      .insert({ title: post.title, body: post.body, author: post.author, author_id: id, is_draft: !!post.isDraft, category: post.category || "elem" })
      .select().maybeSingle();
    if (error) { alert("칼럼 저장에 실패했어요: " + error.message); return null; }
    await logAction(post.isDraft ? "칼럼 임시저장" : "칼럼 작성", post.title);
    await refresh();
    return data ? data.id : null;
  };
  const onDeleteColumn = async (id) => {
    const n = notices.find((x) => x.id === id);
    const { error } = await sb.from("columns").delete().eq("id", id);
    if (error) { alert("칼럼 삭제에 실패했어요: " + error.message); return; }
    await logAction("칼럼 삭제", n ? n.title : id);
    await refresh();
  };
  const onEditColumn = async (id, title, body, isDraft, category) => {
    const patch = { title, body };
    if (typeof isDraft === "boolean") patch.is_draft = isDraft;
    if (category) patch.category = category;
    const { error } = await sb.from("columns").update(patch).eq("id", id);
    if (error) { alert("칼럼 수정에 실패했어요: " + error.message); return; }
    await logAction(isDraft ? "칼럼 임시저장" : "칼럼 수정", title);
    await refresh();
  };
  const onReorderColumns = async (ids) => {
    const results = await Promise.all(ids.map((cid, i) => sb.from("columns").update({ sort_order: i + 1 }).eq("id", cid)));
    const failed = results.find((r) => r && r.error);
    if (failed) { alert("순서 변경에 실패했어요: " + failed.error.message); await refresh(); return; }
    await logAction("칼럼 순서변경", "");
    await refresh();
  };
  const onAddExam = async (exam) => {
    const id = await currentId();
    const author = auth ? ((auth.kakaoId || "").trim() || auth.username || "") : "";
    const { error } = await sb.from("exams").insert({ title: exam.title, questions: exam.questions, author_id: id, author, exam_type: exam.examType || "level", publish_at: exam.publishAt ? new Date(exam.publishAt).toISOString() : null });
    if (error) { alert("시험 저장에 실패했어요: " + error.message); return; }
    await logAction("시험 출제", exam.title);
    await refresh();
  };
  const onEditExam = async (id, exam) => {
    const { error } = await sb.from("exams").update({ title: exam.title, questions: exam.questions, exam_type: exam.examType || "level", publish_at: exam.publishAt ? new Date(exam.publishAt).toISOString() : null }).eq("id", id);
    if (error) { alert("시험 수정에 실패했어요: " + error.message); return; }
    await logAction("시험 수정", exam.title);
    await refresh();
  };
  const onDeleteExam = async (id) => {
    const ex = exams.find((e) => e.id === id);
    const { error } = await sb.from("exams").delete().eq("id", id);
    if (error) { alert("시험 삭제에 실패했어요: " + error.message); return; }
    await logAction("시험 삭제", ex ? ex.title : id);
    await refresh();
  };
  const onGradeSub = async (sub) => {
    const { error } = await sb.from("submissions").update({ manual_scores: sub.manualScores || {}, graded: true }).eq("id", sub.id);
    if (error) { alert("채점 저장에 실패했어요: " + error.message); return; }
    await logAction("채점 수정", sub.student);
    await refresh();
  };
  const onAddSub = async (sub) => {
    const id = await currentId();
    const { error } = await sb.from("submissions").insert({
      exam_id: sub.examId, student: sub.student, student_id: id,
      answers: sub.answers, manual_scores: sub.manualScores || {}, graded: sub.graded,
    });
    if (error) return { error: error.message };
    await refresh();
    return {};
  };
  // 비회원: IP 기준 24시간 중복 방지 함수로 보냄 (개인정보 없이 익명 집계)
  const onGuestSubmit = async (examId, answers) => {
    try {
      await sb.rpc("submit_guest_attempt", { p_exam_id: examId, p_answers: answers });
    } catch (e) {
      console.warn("비회원 집계 실패:", e);
    }
  };
  const onToggleAdmin = async (username, next) => {
    const { error } = await sb.from("profiles").update({ is_admin: next }).eq("username", username);
    if (error) { alert("권한 변경에 실패했어요: " + error.message); return; }
    await logAction(next ? "관리자 지정" : "관리자 해제", username);
    await refresh();
  };
  const onDeleteUser = async (username) => {
    const { error } = await sb.rpc("admin_delete_user", { p_username: username });
    if (error) {
      // 함수가 아직 없거나 실패하면, 최소한 프로필이라도 제거
      await sb.from("profiles").delete().eq("username", username);
      alert("인증 계정 삭제에 실패했어요(프로필만 제거됨): " + error.message);
    }
    await logAction("회원 삭제", username);
    await refresh();
  };
  const onResetPassword = async (username) => {
    const { data, error } = await sb.rpc("admin_reset_password", { p_username: username });
    if (error) { alert("초기화 실패: " + error.message); return; }
    if (data === false) { alert("해당 회원을 찾지 못했어요."); return; }
    await logAction("비밀번호 초기화", username);
    alert(username + " 님의 비밀번호를 0000 으로 초기화했어요.\n로그인 후 계정 화면에서 바꾸도록 안내해주세요.");
  };

  const homeView = (
    <Home role={role} student={student} loggedIn={loggedIn} noticeCount={role === "admin" ? notices.length : notices.filter((n) => !n.isDraft).length} columnUnread={columnUnreadCount(notices, readColIds)} examUnread={todayUnreadCount(exams.filter(isPublished), readExamIds)} examCount={role === "admin" ? exams.length : exams.filter(isPublished).length} onGo={setTab} />
  );

  return (
    <div className="mr-root">
      <style>{CSS}</style>

      <header className="mr-header">
        <div className="mr-brand" onClick={() => setTab("home")} role="button">
          <span className="mr-logo">∫</span>
          <div>
            <div className="mr-brand-name">수학질문방</div>
          </div>
        </div>

        <div className="mr-rolebox">
          {loggedIn ? (
            <button
              className={"mr-account-btn" + (tab === "account" ? " active" : "")}
              onClick={() => setTab("account")}
              aria-label="회원정보"
            >
              <PersonIcon />
            </button>
          ) : (
            <button className="mr-login-btn" onClick={() => setAuthOpen(true)}>
              로그인
            </button>
          )}
        </div>
      </header>

      <main className="mr-main">
        {loading ? (
          <div className="mr-loading">불러오는 중…</div>
        ) : tab === "home" ? (
          homeView
        ) : tab === "records" ? (
          loggedIn ? <MyRecords student={student} exams={exams} subs={subs} /> : homeView
        ) : tab === "admin" ? (
          role === "admin" ? (
            <Admin auth={auth} users={users} notices={notices} exams={exams} subs={subs} auditLog={auditLog} onToggleAdmin={onToggleAdmin} onDeleteUser={onDeleteUser} onResetPassword={onResetPassword} />
          ) : (
            homeView
          )
        ) : tab === "account" ? (
          loggedIn ? <Account auth={auth} onChangePassword={onChangePassword} onUpdateKakao={onUpdateKakao} onDeleteMe={onDeleteMe} onLogout={onLogout} /> : homeView
        ) : tab === "notices" ? (
          <Notices role={role} student={student} kakaoId={auth ? auth.kakaoId : ""} notices={notices} onAdd={onAddColumn} onDelete={onDeleteColumn} onEdit={onEditColumn} onReorder={onReorderColumns} readIds={readColIds} onRead={markColumnRead} />
        ) : tab === "privacy" ? (
          <Privacy onBack={() => setTab("home")} />
        ) : tab === "game" ? (
          <SpeedGame onBack={() => setTab("home")} auth={auth} onGoAccount={() => setTab("account")} onLogin={() => setAuthOpen(true)} />
        ) : (
          <Exams
            role={role}
            student={student}
            myId={auth ? auth.id : null}
            users={users}
            loggedIn={loggedIn}
            requireLogin={requireLogin}
            exams={exams}
            subs={subs}
            onAddExam={onAddExam}
            onEditExam={onEditExam}
            onDeleteExam={onDeleteExam}
            onGradeSub={onGradeSub}
            onAddSub={onAddSub}
            onGuestSubmit={onGuestSubmit}
            guestSubs={guestSubs}
            readIds={readExamIds}
            onView={markExamRead}
          />
        )}
      </main>

      <footer className="mr-foot">
        <span className="mr-foot-copy">© suhakjilmoon</span>
        <span className="mr-foot-sep">·</span>
        <button className="mr-foot-link" onClick={() => setTab("privacy")}>개인정보 처리방침</button>
      </footer>

      {authOpen && <AuthModal onClose={() => setAuthOpen(false)} onLogin={onLogin} onSignup={onSignup} />}
    </div>
  );
}

      <path

/* ===================== 회원정보 ===================== */
function Account({ auth, onChangePassword, onUpdateKakao, onDeleteMe, onLogout }) {
  const [curPw, setCurPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [done, setDone] = useState(false);
  const [kakao, setKakao] = useState(auth.kakaoId || "");
  const [kakaoDone, setKakaoDone] = useState(false);
  const [withdraw, setWithdraw] = useState(false);
  const [delPw, setDelPw] = useState("");

  const changePw = async () => {
    if (!curPw || !newPw) return alert("현재 비밀번호와 새 비밀번호를 입력하세요.");
    const { error } = await onChangePassword(curPw, newPw);
    if (error) return alert(error);
    setCurPw("");
    setNewPw("");
    setDone(true);
  };

  const saveKakao = async () => {
    const { error } = await onUpdateKakao(kakao.trim());
    if (error) return alert(error);
    setKakaoDone(true);
  };

  const deleteMe = async () => {
    if (!delPw) return alert("비밀번호를 입력하세요.");
    if (!confirm("정말 탈퇴할까요? 계정과 기록이 삭제되며 되돌릴 수 없어요.")) return;
    const { error } = await onDeleteMe(delPw);
    if (error) return alert(error);
    alert("탈퇴가 완료됐어요. 그동안 이용해주셔서 감사합니다.");
  };

  return (
    <div className="mr-col">
      <section className="mr-card mr-account-card">
        <div className="mr-account-avatar">
          <PersonIcon />
        </div>
        <div className="mr-account-name">{auth.username}</div>
        <div className="mr-account-role">
          {auth.isAdmin ? "관리자" : "일반 회원"}
          {!auth.isAdmin && auth.kakaoId ? ` · 채팅방 ${auth.kakaoId}` : ""}
        </div>
      </section>

      <section className="mr-card">
        <div className="mr-card-tag">내 정보</div>
        <div className="mr-cat-label">채팅방 닉네임</div>
        <input
          className="mr-input"
          placeholder="채팅방에서 쓰는 이름"
          value={kakao}
          onChange={(e) => { setKakao(e.target.value); setKakaoDone(false); }}
        />
        <div className="mr-row-between" style={{ marginTop: "14px" }}>
          <span className="mr-ok-msg">{kakaoDone ? "저장됐어요" : ""}</span>
          <button className="mr-btn" onClick={saveKakao}>저장</button>
        </div>
      </section>

      <section className="mr-card">
        <div className="mr-card-tag">비밀번호 변경</div>
        <input
          className="mr-input"
          type="password"
          placeholder="현재 비밀번호"
          value={curPw}
          onChange={(e) => {
            setCurPw(e.target.value);
            setDone(false);
          }}
        />
        <input
          className="mr-input"
          type="password"
          placeholder="새 비밀번호"
          value={newPw}
          onChange={(e) => {
            setNewPw(e.target.value);
            setDone(false);
          }}
        />
        <div className="mr-row-between" style={{ marginTop: "14px" }}>
          <span className="mr-ok-msg">{done ? "비밀번호가 변경됐어요" : ""}</span>
          <button className="mr-btn" onClick={changePw}>
            변경하기
          </button>
        </div>
      </section>

      <button className="mr-logout-full" onClick={onLogout}>
        로그아웃
      </button>

      {!withdraw ? (
        <button className="mr-withdraw-link" onClick={() => setWithdraw(true)}>
          회원 탈퇴
        </button>
      ) : (
        <section className="mr-card mr-withdraw-card">
          <div className="mr-card-tag">회원 탈퇴</div>
          <p className="mr-withdraw-warn">탈퇴하면 계정과 시험 기록이 삭제되며 되돌릴 수 없어요. 계속하려면 비밀번호를 입력하세요.</p>
          <input
            className="mr-input"
            type="password"
            placeholder="비밀번호 확인"
            value={delPw}
            onChange={(e) => setDelPw(e.target.value)}
          />
          <div className="mr-row-end" style={{ marginTop: "14px", gap: "8px" }}>
            <button className="mr-btn-ghost" onClick={() => { setWithdraw(false); setDelPw(""); }}>
              취소
            </button>
            <button className="mr-btn mr-btn-danger" onClick={deleteMe}>
              탈퇴하기
            </button>
          </div>
        </section>
      )}
    </div>
  );
}

/* ===================== 내 시험 기록 ===================== */
function MyRecords({ student, exams, subs }) {
  const [open, setOpen] = useState(null);
  const mine = subs
    .filter((s) => s.student === student)
    .map((s) => ({ sub: s, exam: exams.find((e) => e.id === s.examId) }))
    .filter((r) => r.exam)
    .sort((a, b) => (b.sub.submittedAt || 0) - (a.sub.submittedAt || 0));

  if (open) {
    const { sub, exam } = open;
    const score = totalScore(exam, sub);
    const max = maxScore(exam);
    const ratio = max ? score / max : 0;
    const tone = ratio >= 0.8 ? "good" : ratio >= 0.5 ? "mid" : "low";
    return (
      <div className="mr-col">
        <button className="mr-btn-text" onClick={() => setOpen(null)}>← 내 시험 기록</button>
        <section className="mr-card" style={{ textAlign: "center", padding: "28px 20px" }}>
          <div className="mr-card-tag" style={{ marginBottom: "10px" }}>{exam.title}</div>
          <div className={"mr-record-score " + tone} style={{ fontSize: "40px" }}>
            {score}
            <span className="mr-record-max"> / {max}</span>
          </div>
          <div className="mr-record-meta" style={{ marginTop: "10px" }}>{fmtDate(sub.submittedAt)}</div>
        </section>
        <div className="mr-list-top">
          <span className="mr-list-title">채점 결과</span>
        </div>
        <ReviewList exam={exam} sub={sub} />
      </div>
    );
  }

  return (
    <div className="mr-col">
      <div className="mr-list-top">
        <span className="mr-list-title">내 시험 기록</span>
      </div>
      {mine.length === 0 ? (
        <Empty text="아직 응시한 시험이 없어요." />
      ) : (
        <div className="mr-postlist">
          {mine.map(({ sub, exam }, i) => {
            const score = totalScore(exam, sub);
            const max = maxScore(exam);
            const ratio = max ? score / max : 0;
            const tone = ratio >= 0.8 ? "good" : ratio >= 0.5 ? "mid" : "low";
            return (
              <button className="mr-record mr-record-btn" key={sub.id} style={{ animationDelay: `${i * 30}ms` }} onClick={() => setOpen({ sub, exam })}>
                <div className="mr-record-info">
                  <div className="mr-record-title">{exam.title}</div>
                  <div className="mr-record-meta">{fmtDate(sub.submittedAt)} · 채점 결과 보기</div>
                </div>
                <div className={"mr-record-score " + tone}>
                  {score}
                  <span className="mr-record-max"> / {max}</span>
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ===================== 관리자 페이지 ===================== */
function Admin({ auth, users, notices, exams, subs, auditLog, onToggleAdmin, onDeleteUser, onResetPassword }) {
  const [subtab, setSubtab] = useState("dash");
  const [selUser, setSelUser] = useState(null);
  const [q, setQ] = useState("");

  const stats = [
    { label: "회원", value: users.length },
    { label: "칼럼", value: notices.length },
    { label: "시험", value: exams.length },
    { label: "제출", value: subs.length },
  ];

  const toggleAdmin = async (username) => {
    const u = users.find((x) => x.username === username);
    await onToggleAdmin(username, !(u && u.isAdmin));
  };
  const removeUser = async (username) => {
    if (!confirm(`'${username}' 회원을 삭제할까요?`)) return;
    await onDeleteUser(username);
    if (selUser === username) setSelUser(null);
  };
  const resetPw = async (username) => {
    if (!confirm(`'${username}' 회원의 비밀번호를 0000 으로 초기화할까요?`)) return;
    await onResetPassword(username);
  };

  const sorted = [...users].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const kw = q.trim().toLowerCase();
  const filtered = kw
    ? sorted.filter(
        (u) =>
          u.username.toLowerCase().includes(kw) || (u.kakaoId || "").toLowerCase().includes(kw)
      )
    : sorted;

  const scoreTone = (ratio) => (ratio >= 0.8 ? "good" : ratio >= 0.5 ? "mid" : "low");

  if (selUser) {
    const u = users.find((x) => x.username === selUser);
    const theirs = subs
      .filter((s) => s.student === selUser)
      .map((s) => ({ sub: s, exam: exams.find((e) => e.id === s.examId) }))
      .filter((r) => r.exam)
      .sort((a, b) => (b.sub.submittedAt || 0) - (a.sub.submittedAt || 0));

    return (
      <div className="mr-col">
        <button className="mr-btn-text" onClick={() => setSelUser(null)}>
          ← 회원 목록
        </button>
        {!u ? (
          <Empty text="회원을 찾을 수 없어요." />
        ) : (
          <>
            <section className="mr-card mr-account-card">
              <div className="mr-account-avatar">
                <PersonIcon />
              </div>
              <div className="mr-account-name">
                {u.username}
                {u.isAdmin && <span className="mr-user-badge">관리자</span>}
              </div>
              <div className="mr-account-role">
                {u.kakaoId ? `채팅방 ${u.kakaoId}` : "채팅방 미입력"}
                {u.createdAt ? ` · 가입 ${fmtDate(u.createdAt)}` : ""}
              </div>
              <div className="mr-detail-actions">
                <button className="mr-mini-btn" onClick={() => toggleAdmin(u.username)}>
                  {u.isAdmin ? "관리자 해제" : "관리자 지정"}
                </button>
                <button className="mr-mini-btn" onClick={() => resetPw(u.username)}>
                  비밀번호 초기화
                </button>
                <button className="mr-mini-btn danger" onClick={() => removeUser(u.username)}>
                  회원 삭제
                </button>
              </div>
            </section>

            <section className="mr-card">
              <div className="mr-card-tag">시험 결과 ({theirs.length}건)</div>
              {theirs.length === 0 ? (
                <p className="mr-muted" style={{ fontSize: "14px" }}>
                  아직 응시한 시험이 없어요.
                </p>
              ) : (
                <div className="mr-member-list">
                  {theirs.map(({ sub, exam }) => {
                    const score = totalScore(exam, sub);
                    const max = maxScore(exam);
                    const tone = scoreTone(max ? score / max : 0);
                    return (
                      <div className="mr-record" key={sub.id}>
                        <div className="mr-record-info">
                          <div className="mr-record-title">{exam.title}</div>
                          <div className="mr-record-meta">{fmtDate(sub.submittedAt)}</div>
                        </div>
                        <div className={"mr-record-score " + tone}>
                          {score}
                          <span className="mr-record-max"> / {max}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </section>
          </>
        )}
      </div>
    );
  }

  return (
    <div className="mr-col">
      <div className="mr-list-top">
        <span className="mr-list-title">관리자 페이지</span>
      </div>

      <div className="mr-subtabs">
        <button className={subtab === "dash" ? "on" : ""} onClick={() => setSubtab("dash")}>
          대시보드
        </button>
        <button className={subtab === "members" ? "on" : ""} onClick={() => setSubtab("members")}>
          회원 {users.length}
        </button>
        <button className={subtab === "log" ? "on" : ""} onClick={() => setSubtab("log")}>
          활동 기록
        </button>
      </div>

      {subtab === "dash" ? (
        <>
          <section className="mr-card">
            <div className="mr-stat-grid">
              {stats.map((s) => (
                <div className="mr-stat" key={s.label}>
                  <div className="mr-stat-num">{s.value}</div>
                  <div className="mr-stat-label">{s.label}</div>
                </div>
              ))}
            </div>
          </section>

          <section className="mr-card">
            <div className="mr-card-tag">시험별 제출 현황</div>
            {exams.length === 0 ? (
              <p className="mr-muted" style={{ fontSize: "14px" }}>
                출제된 시험이 없어요.
              </p>
            ) : (
              <div className="mr-exam-summary">
                {exams.map((ex) => {
                  const es = subs.filter((s) => s.examId === ex.id);
                  const avg = es.length
                    ? Math.round(es.reduce((sum, s) => sum + totalScore(ex, s), 0) / es.length)
                    : 0;
                  return (
                    <div className="mr-exam-sum-row" key={ex.id}>
                      <div className="mr-exam-sum-title">{ex.title}</div>
                      <div className="mr-exam-sum-meta">
                        제출 {es.length}건{es.length > 0 ? ` · 평균 ${avg}/${maxScore(ex)}점` : ""}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </section>
        </>
      ) : subtab === "members" ? (
        <>
          <input
            className="mr-input"
            placeholder="아이디 · 채팅방 닉네임 검색"
            value={q}
            onChange={(e) => setQ(e.target.value)}
            style={{ marginTop: 0 }}
          />
          {filtered.length === 0 ? (
            <Empty text={users.length === 0 ? "아직 가입한 회원이 없어요." : "검색 결과가 없어요."} />
          ) : (
            <div className="mr-postlist">
              {filtered.map((u) => (
                <button
                  className="mr-member-row"
                  key={u.username}
                  onClick={() => setSelUser(u.username)}
                >
                  <span className="mr-avatar sm">{u.username[0]}</span>
                  <span className="mr-member-info">
                    <span className="mr-member-name">
                      {u.username}
                      {u.isAdmin && <span className="mr-user-badge">관리자</span>}
                    </span>
                    <span className="mr-member-meta">
                      {u.kakaoId ? <strong className="mr-member-nick">{u.kakaoId}</strong> : "닉네임 미입력"}
                      {u.createdAt ? ` · ${fmtDate(u.createdAt)}` : ""}
                    </span>
                  </span>
                  <span className="mr-sector-arrow">→</span>
                </button>
              ))}
            </div>
          )}
        </>
      ) : (
        <section className="mr-card">
          <div className="mr-card-tag">활동 기록</div>
          {(!auditLog || auditLog.length === 0) ? (
            <p className="mr-muted" style={{ fontSize: "14px" }}>아직 기록이 없어요.</p>
          ) : (
            <div className="mr-log-list">
              {auditLog.map((g) => (
                <div className="mr-log-row" key={g.id}>
                  <div className="mr-log-main">
                    <span className="mr-log-actor">{g.actor || "?"}</span>
                    <span className="mr-log-action">{g.action}</span>
                    {g.target ? <span className="mr-log-target">{g.target}</span> : null}
                  </div>
                  <div className="mr-log-time">{g.created_at ? fmtDate(Date.parse(g.created_at)) : ""}</div>
                </div>
              ))}
            </div>
          )}
        </section>
      )}
    </div>
  );
}

function AuthModal({ onClose, onLogin, onSignup }) {
  const [mode, setMode] = useState("login");
  const [id, setId] = useState("");
  const [pw, setPw] = useState("");
  const [kakao, setKakao] = useState("");
  const [agree, setAgree] = useState(false);
  const [showPolicy, setShowPolicy] = useState(false);

  const doLogin = async () => {
    const { error } = await onLogin(id, pw);
    if (error) alert(error);
  };

  const doSignup = async () => {
    if (!agree) {
      alert("개인정보 수집·이용에 동의해주세요.");
      return;
    }
    const { error } = await onSignup(id, pw, kakao);

  return (
    <div className="mr-modal-overlay" onClick={onClose}>
      <div className="mr-modal" onClick={(e) => e.stopPropagation()}>

          <span className="mr-modal-title">{mode === "login" ? "로그인" : "회원가입"}</span>
          <button className="mr-modal-x" onClick={onClose}>

          </button>

          className="mr-input"
          placeholder="아이디"
          value={id}

          className="mr-input"
          type="password"
          placeholder="비밀번호"
          value={pw}
          onChange={(e) => setPw(e.target.value)}

        {mode === "signup" && (
          <input
            className="mr-input"
            placeholder="채팅방 닉네임 (선택)"
            value={kakao}
            onChange={(e) => setKakao(e.target.value)}
          />
        )}

        {mode === "signup" && (
          <label className="mr-consent">
            <input type="checkbox" checked={agree} onChange={(e) => setAgree(e.target.checked)} />
            <span>
              <button type="button" className="mr-consent-link" onClick={() => setShowPolicy(true)}>개인정보 처리방침</button>
              에 동의하며, 만 14세 이상이고 개인정보 수집·이용에 동의합니다. (필수)
            </span>
          </label>
        )}

        <button
          className="mr-btn mr-modal-submit"
          onClick={mode === "login" ? doLogin : doSignup}
        >
          {mode === "login" ? "로그인" : "가입하고 시작하기"}
        </button>

        <div className="mr-modal-switch">
          {mode === "login" ? (
            <>
              아직 회원이 아니신가요?{" "}
              <button onClick={() => setMode("signup")}>회원가입</button>
            </>
          ) : (
            <>
              이미 계정이 있나요?{" "}
              <button onClick={() => setMode("login")}>로그인</button>
            </>
          )}
        </div>
      </div>

      {showPolicy && <PolicyModal onClose={() => setShowPolicy(false)} />}
    </div>
  );
}

/* ===================== 칼럼 ===================== */
function Notices({ role, student, kakaoId, notices, onAdd, onDelete, onEdit, onReorder, readIds, onRead }) {
  const CAT = { elem: "초등학교", mid: "중학교", high: "고등학교" };
  const CATS = ["elem", "mid", "high"];
  const [view, setView] = useState("list"); // list | write | read | edit
  const [cat, setCat] = useState("elem"); // 목록에서 보고 있는 분류 탭
  const [editCat, setEditCat] = useState("elem"); // 글 작성/수정 시 선택한 분류
  const [openId, setOpenId] = useState(null);
  const [draftId, setDraftId] = useState(null);
  const [title, setTitle] = useState("");
  const [body, setBody] = useState("");
  const [savedNote, setSavedNote] = useState("");

  const authorName = () => (kakaoId || "").trim() || (student || "").trim() || "익명";

  const newWrite = () => {
    setTitle("");
    setBody("");
    setDraftId(null);
    setEditCat(cat);
    setSavedNote("");
    setView("write");
  };
  const resumeDraft = (d) => {
    setTitle(d.title === "(제목 없음)" ? "" : d.title);
    setBody(d.body);
    setDraftId(d.id);
    setEditCat(d.category || "elem");
    setSavedNote("");
    setView("write");
  };

  // 임시저장 (발행 안 함)
  const saveDraft = async () => {
    if (!title.trim() && !body.trim()) return alert("내용을 입력하세요.");
    if (draftId) {
      await onEdit(draftId, title.trim() || "(제목 없음)", body, true, editCat);
    } else {
      const newId = await onAdd({ title: title.trim() || "(제목 없음)", body, author: authorName(), isDraft: true, category: editCat });
      if (newId) setDraftId(newId);
    }
    setSavedNote("임시저장됐어요");
  };

  // 발행 (목록에 공개)
  const post = async () => {
    if (!title.trim()) return alert("제목을 입력하세요.");
    if (draftId) {
      await onEdit(draftId, title.trim(), body, false, editCat);
    } else {
      await onAdd({ title: title.trim(), body, author: authorName(), isDraft: false, category: editCat });
    }
    setTitle("");
    setBody("");
    setDraftId(null);
    setCat(editCat);
    setView("list");
  };

  const remove = async (id) => {
    if (!confirm("이 칼럼을 삭제할까요?")) return;
    await onDelete(id);
    setOpenId(null);
    setView("list");
  };

  const saveEdit = async () => {
    if (!title.trim()) return alert("제목을 입력하세요.");
    await onEdit(openId, title.trim(), body, false, editCat);
    setView("read");
  };

  const CatPicker = (
    <>
      <div className="mr-cat-label">대상</div>
      <div className="mr-cat-seg">
        {CATS.map((k) => (
          <button key={k} className={editCat === k ? "on" : ""} onClick={() => setEditCat(k)}>
            {CAT[k]}
          </button>
        ))}
      </div>
    </>
  );

  // 글쓰기 / 임시저장 이어쓰기
  if (view === "write")
    return (
      <div className="mr-col">
        <button className="mr-btn-text" onClick={() => setView("list")}>
          ← 칼럼 목록
        </button>
        <section className="mr-card mr-writer">
          <div className="mr-card-tag">{draftId ? "임시저장 이어쓰기" : "새 칼럼 쓰기"}</div>
          <input
            className="mr-input mr-title-input"
            placeholder="제목"
            value={title}
            onChange={(e) => { setTitle(e.target.value); setSavedNote(""); }}
          />
          {CatPicker}
          <RichEditor
            value={body}
            onChange={(v) => { setBody(v); setSavedNote(""); }}
            placeholder="이야기를 자유롭게 풀어보세요. 풀이 접근법, 개념 정리, 공부 팁 무엇이든 좋아요."
          />
          <div className="mr-row-between" style={{ marginTop: "14px" }}>
            <span className="mr-ok-msg">{savedNote}</span>
            <div className="mr-gap">
              <button className="mr-btn-ghost" onClick={saveDraft}>
                임시저장
              </button>
              <button className="mr-btn" onClick={post}>
                발행하기
              </button>
            </div>
          </div>
        </section>
      </div>
    );

  // 글 수정하기 (발행된 글)
  if (view === "edit")
    return (
      <div className="mr-col">
        <button className="mr-btn-text" onClick={() => setView("read")}>
          ← 칼럼 보기
        </button>
        <section className="mr-card mr-writer">
          <div className="mr-card-tag">칼럼 수정하기</div>
          <input
            className="mr-input mr-title-input"
            placeholder="제목"
            value={title}
            onChange={(e) => setTitle(e.target.value)}
          />
          {CatPicker}
          <RichEditor
            value={body}
            onChange={setBody}
            placeholder="내용을 입력하세요."
          />
          <div className="mr-row-end">
            <button className="mr-btn" onClick={saveEdit}>
              수정 완료
            </button>
          </div>
        </section>
      </div>
    );

  // 글 보기
  if (view === "read") {
    const n = notices.find((x) => x.id === openId);
    return (
      <div className="mr-col">
        <button className="mr-btn-text" onClick={() => setView("list")}>
          ← 칼럼 목록
        </button>
        {!n ? (
          <Empty text="글을 찾을 수 없어요." />
        ) : (
          <article className="mr-card mr-notice mr-post">
            <h1 className="mr-post-title">{n.title}</h1>
            <div className="mr-post-byline">
              <span className="mr-avatar sm">{(n.author || "익")[0]}</span>
              {n.author || "익명"} · {fmtDate(n.createdAt)}
            </div>
            <div className="mr-post-divider" />
            {n.body ? <div className="mr-notice-body" dangerouslySetInnerHTML={{ __html: n.body }} /> : <p className="mr-muted">내용이 없어요.</p>}
            {role === "admin" && (
              <div className="mr-detail-actions" style={{ marginTop: "20px", justifyContent: "flex-end" }}>
                <button className="mr-mini-btn" onClick={() => { setTitle(n.title); setBody(n.body); setEditCat(n.category || "elem"); setDraftId(null); setView("edit"); }}>
                  수정
                </button>
                <button className="mr-mini-btn danger" onClick={() => remove(n.id)}>
                  삭제
                </button>
              </div>
            )}
          </article>
        )}
      </div>
    );
  }

  // 목록
  const inCat = (n) => (n.category || "elem") === cat;
  const published = notices
    .filter((n) => !n.isDraft && inCat(n))
    .sort((a, b) => (a.sortOrder - b.sortOrder) || (b.createdAt - a.createdAt));
  const drafts = notices.filter((n) => n.isDraft && inCat(n));

  const move = async (idx, dir) => {
    const j = idx + dir;
    if (j < 0 || j >= published.length) return;
    const ids = published.map((n) => n.id);
    const t = ids[idx];
    ids[idx] = ids[j];
    ids[j] = t;
    await onReorder(ids);
  };

  return (
    <div className="mr-col">
      <div className="mr-list-top">
        <span className="mr-list-title">칼럼</span>
        {role === "admin" && (
          <button className="mr-btn" onClick={newWrite}>
            글쓰기
          </button>
        )}
      </div>

      <div className="mr-subtabs">
        {CATS.map((k) => (
          <button key={k} className={cat === k ? "on" : ""} onClick={() => setCat(k)}>
            {CAT[k]}
          </button>
        ))}
      </div>

      {role === "admin" && drafts.length > 0 && (
        <>
          <div className="mr-draft-head">임시저장 {drafts.length}</div>
          <div className="mr-postlist">
            {drafts.map((n) => (
              <button key={n.id} className="mr-post-row" onClick={() => resumeDraft(n)}>
                <span className="mr-post-row-title">
                  {n.title}
                  <span className="mr-draft-badge">임시저장</span>
                </span>
                <span className="mr-post-row-meta">{fmtDate(n.createdAt)}</span>
              </button>
            ))}
          </div>
        </>
      )}

      {published.length === 0 ? (
        <Empty text="아직 발행된 칼럼이 없어요." />
      ) : (
        <div className="mr-postlist">
          {published.map((n, i) => {
            const unread = readIds && !readIds.has(n.id);
            return (
            <div className="mr-post-item" key={n.id}>
              <button
                className="mr-post-row"
                onClick={() => {
                  if (onRead) onRead(n.id);
                  setOpenId(n.id);
                  setView("read");
                }}
              >
                <span className="mr-post-row-title">
                  {unread && <span className="mr-unread-dot" />}
                  {n.title}
                </span>
                <span className="mr-post-row-meta">
                  {n.author || "익명"} · {fmtDate(n.createdAt)}
                </span>
              </button>
              {role === "admin" && (
                <div className="mr-reorder">
                  <button onClick={() => move(i, -1)} disabled={i === 0} title="위로">▲</button>
                  <button onClick={() => move(i, 1)} disabled={i === published.length - 1} title="아래로">▼</button>
                </div>
              )}
            </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ===================== 서식 입력기 (칼럼용) ===================== */
function RichEditor({ value, onChange, placeholder }) {
  const ref = React.useRef(null);
  const lastRange = React.useRef(null);
  const draft = React.useRef({ latex: "", tree: null });
  const [building, setBuilding] = useState(null);
  React.useEffect(() => {
    if (ref.current && (value || "") !== ref.current.innerHTML) {
      ref.current.innerHTML = value || "";
    }
    // 최초 1회만 초기화 (입력 중 커서 유지)
  }, []);
  const sync = () => {
    if (ref.current) onChange(ref.current.innerHTML);
  };
  const exec = (cmd, arg) => {
    document.execCommand(cmd, false, arg);
    if (ref.current) ref.current.focus();
    sync();
  };
  const tool = (e, cmd, arg) => {
    e.preventDefault(); // 선택 영역 유지
    exec(cmd, arg);
  };
  const saveRange = () => {
    const sel = document.getSelection();
    if (sel && sel.rangeCount && ref.current && ref.current.contains(sel.anchorNode)) {
      lastRange.current = sel.getRangeAt(0).cloneRange();
    }
  };
  const openNewMath = (e) => { e.preventDefault(); saveRange(); draft.current = { latex: "", tree: null }; setBuilding({ mode: "new" }); };
  const openEditMath = (chip) => {
    let tree = null;
    try { tree = JSON.parse(decodeURIComponent(chip.dataset.tree || "")); } catch (err) {}
    draft.current = { latex: chip.dataset.latex || "", tree };
    setBuilding({ mode: "edit", chip });
  };
  const onBoxClick = (e) => {
    const chip = e.target && e.target.closest ? e.target.closest(".mchip") : null;
    if (chip) { e.preventDefault(); openEditMath(chip); }
  };
  const finishMath = () => {
    if (!building) return;
    const { latex, tree } = draft.current;
    if (building.mode === "edit" && building.chip) {
      const chip = building.chip;
      chip.dataset.latex = latex || "";
      chip.dataset.tree = tree ? encodeURIComponent(JSON.stringify(tree)) : "";
      chip.innerHTML = chipInnerHtml(latex);
    } else {
      const el = ref.current;
      const parts = tree === null ? parseMixed(latex) : [{ type: "math", latex, tree }];
      const frag = buildMixedFragment(parts);
      const sp = document.createTextNode("\u00A0");
      frag.appendChild(sp);
      const range = lastRange.current && el && el.contains(lastRange.current.commonAncestorContainer) ? lastRange.current : null;
      if (range) {
        range.collapse(false);
        range.insertNode(frag);
        const r2 = document.createRange();
        r2.setStartAfter(sp); r2.collapse(true);
        const sel = document.getSelection(); sel.removeAllRanges(); sel.addRange(r2);
      } else if (el) {
        el.appendChild(frag);
      }
    }
    setBuilding(null);
    sync();
    if (ref.current) ref.current.focus();
  };
  const colors = ["#191F28", "#F04452", "#3182F6", "#00B262", "#F59F00", "#7048E8"];
  return (
    <div className="mr-rte-wrap">
      <div className="mr-rte-toolbar">
        <button type="button" className="mr-rte-btn" style={{ fontWeight: 800 }} title="굵게" onMouseDown={(e) => tool(e, "bold")}>가</button>
        <button type="button" className="mr-rte-btn" style={{ fontStyle: "italic" }} title="기울임" onMouseDown={(e) => tool(e, "italic")}>가</button>
        <button type="button" className="mr-rte-btn" style={{ textDecoration: "underline" }} title="밑줄" onMouseDown={(e) => tool(e, "underline")}>가</button>
        <button type="button" className="mr-rte-btn" style={{ textDecoration: "line-through" }} title="취소선" onMouseDown={(e) => tool(e, "strikeThrough")}>가</button>
        <span className="mr-rte-div" />
        <button type="button" className="mr-rte-btn sm" title="작게" onMouseDown={(e) => tool(e, "fontSize", "2")}>작게</button>
        <button type="button" className="mr-rte-btn sm" title="보통" onMouseDown={(e) => tool(e, "fontSize", "4")}>보통</button>
        <button type="button" className="mr-rte-btn sm" title="크게" onMouseDown={(e) => tool(e, "fontSize", "6")}>크게</button>
        <span className="mr-rte-div" />
        <button type="button" className="mr-rte-btn sm" title="고딕체" onMouseDown={(e) => tool(e, "fontName", "'Pretendard', sans-serif")}>고딕</button>
        <button type="button" className="mr-rte-btn sm" style={{ fontFamily: "serif" }} title="명조체" onMouseDown={(e) => tool(e, "fontName", "serif")}>명조</button>
        <span className="mr-rte-div" />
        {colors.map((c) => (
          <button
            type="button"
            key={c}
            className="mr-rte-color"
            style={{ background: c }}
            title="글자색"
            onMouseDown={(e) => tool(e, "foreColor", c)}
          />
        ))}
        <span className="mr-rte-div" />
        <button type="button" className="mr-rte-btn sm mathbtn" title="수식 넣기" onMouseDown={openNewMath}>＋수식</button>
      </div>
      {building && (
        <div className="mr-rte-mathedit">
          <MathField initialTree={draft.current.tree} initialLatex={draft.current.latex} onChange={(latex, tree) => { draft.current = { latex, tree }; }} />
          <div className="mr-rich-mrow">
            <button type="button" className="mr-btn" onClick={finishMath}>{building.mode === "edit" ? "수정 완료" : "이 수식 넣기"}</button>
            <button type="button" className="mr-btn-text" onClick={() => setBuilding(null)}>취소</button>
          </div>
        </div>
      )}
      <div
        ref={ref}
        className="mr-rte"
        contentEditable
        suppressContentEditableWarning
        data-placeholder={placeholder || ""}
        onInput={sync}
        onBlur={() => { saveRange(); sync(); }}
        onKeyUp={saveRange}
        onMouseUp={saveRange}
        onClick={onBoxClick}
      />
    </div>
  );
}

        <button className="mr-pick-card" onClick={() => onPick("level")}>
          <span className="mr-pick-icon blue">🎯</span>
          <span className="mr-pick-title">레벨테스트</span>
          <span className="mr-pick-desc">내 실력 진단</span>
        </button>
        <button className="mr-pick-card" onClick={() => onPick("today")}>
          <span className="mr-pick-icon green">📅{todayUnread > 0 && <span className="mr-sector-dot" />}</span>
          <span className="mr-pick-title">오늘의 문제</span>
          <span className="mr-pick-desc">매일 풀어보기</span>
        </button>
      </div>
    </div>
  );
}

/* 시험 응시 래퍼 (관리자/학생 공용 - TakeExam 연결을 한 곳에서 관리) */
function ExamTaker({ taking, setTaking, student, loggedIn, onAddSub, onGuestSubmit }) {
  return (
    <TakeExam
      exam={taking}
      student={student}
      loggedIn={loggedIn}
      onGuestSubmit={onGuestSubmit}
      onCancel={() => setTaking(null)}
      onSubmit={onAddSub}
    />
  );
}

function isPublished(exam) {
  return !exam.publishAt || exam.publishAt <= Date.now();
}

/* 칼럼 읽음 추적 (기기에 저장) */
const COL_READ_KEY = "mrreadcols";
function getReadColIds() {
  try { return new Set(JSON.parse(localStorage.getItem(COL_READ_KEY) || "[]")); } catch (e) { return new Set(); }
}
function saveReadColIds(set) {
  try { localStorage.setItem(COL_READ_KEY, JSON.stringify([...set])); } catch (e) {}
}
/* 시험 확인 추적 (기기에 저장) */
const EXAM_READ_KEY = "mrreadexams";
function getReadExamIds() {
  try { return new Set(JSON.parse(localStorage.getItem(EXAM_READ_KEY) || "[]")); } catch (e) { return new Set(); }
}
function saveReadExamIds(set) {
  try { localStorage.setItem(EXAM_READ_KEY, JSON.stringify([...set])); } catch (e) {}
}
function columnUnreadCount(notices, readIds) {
  return (notices || []).filter((n) => !n.isDraft && !readIds.has(n.id)).length;
}

/* 오늘의 문제 안 본 것 추적: 칼럼 읽음과 동일하게 "확인(열어봄)" 기준 (readIds 공용) */
function isExamViewed(exam, readIds) {
  return readIds && readIds.has(exam.id);
}
function todayUnreadCount(exams, readIds) {
  return (exams || []).filter(
    (e) => (e.examType || "level") === "today" && isPublished(e) && !isExamViewed(e, readIds)
  ).length;
}

function Exams(props) {
  const [examType, setExamType] = useState(null); // null=선택화면, 'level' | 'today'
  if (!examType) return <ExamChooser onPick={setExamType} todayUnread={todayUnreadCount((props.exams || []).filter(isPublished), props.readIds || new Set())} />;
  const filtered = (props.exams || []).filter((e) => (e.examType || "level") === examType);
  const onBackToChooser = () => setExamType(null);
  if (props.role === "admin")
    return <ExamsAdmin {...props} exams={filtered} examType={examType} onBackToChooser={onBackToChooser} />;
  // 학생/비회원: 공개 시각이 지난 시험만 노출
  const visible = filtered.filter(isPublished);
  return <ExamsStudent {...props} exams={visible} examType={examType} onBackToChooser={onBackToChooser} />;
}

/* ---------- 관리자: 시험 목록 / 출제 / 채점 / (남의 시험) 응시 ---------- */
function ExamsAdmin({ exams, onAddExam, onEditExam, onDeleteExam, subs, onGradeSub, onAddSub, myId, student, loggedIn, guestSubs, examType, onBackToChooser, users, readIds, onView }) {
  const [mode, setMode] = useState("list");
  const [activeExam, setActiveExam] = useState(null);
  const [taking, setTaking] = useState(null);

  const openGrade = (exam) => {
    setActiveExam(exam);
    setMode("grade");
  };
  const openEdit = (exam) => {
    setActiveExam(exam);
    setMode("edit");
  };
  const removeExam = async (exam) => {
    if (!confirm(`'${exam.title}' 시험을 삭제할까요? 되돌릴 수 없어요.`)) return;
    await onDeleteExam(exam.id);
  };

  if (taking)
    return (
      <ExamTaker taking={taking} setTaking={setTaking} student={student} loggedIn={loggedIn} onAddSub={onAddSub} />
    );

  if (mode === "create")
    return (
      <ExamEditor
        defaultType={examType}
        onCancel={() => setMode("list")}
        onSave={async (exam) => {
          await onAddExam(exam);
          setMode("list");
        }}
      />
    );

  if (mode === "edit" && activeExam)
    return (
      <ExamEditor
        initial={activeExam}
        onCancel={() => setMode("list")}
        onSave={async (exam) => {
          await onEditExam(activeExam.id, exam);
          setMode("list");
        }}
      />
    );

  if (mode === "grade" && activeExam)
    return (
      <GradePanel
        exam={activeExam}
        subs={subs.filter((s) => s.examId === activeExam.id)}
        guestSubs={(guestSubs || []).filter((g) => g.exam_id === activeExam.id)}
        users={users}
        onBack={() => setMode("list")}
        onSaveGrade={async (updated) => {
          await onGradeSub(updated);
        }}
      />
    );

  return (
    <div className="mr-col">
      <button className="mr-btn-text" onClick={onBackToChooser}>
        ← 시험 종류
      </button>
      <div className="mr-list-top">
        <span className="mr-list-title">{EXAM_TYPES[examType]}</span>
        <button className="mr-btn" onClick={() => setMode("create")}>
          + 새 시험 출제
        </button>
      </div>
      {exams.length === 0 ? (
        <Empty text="아직 출제된 시험이 없어요." />
      ) : (
        exams.map((ex, i) => {
          const exSubs = subs.filter((s) => s.examId === ex.id);
          const pending = exSubs.filter((s) => !s.graded).length;
          const isMine = ex.authorId && myId && ex.authorId === myId;
          const canEdit = isMine || !ex.authorId;
          const myTake = subs.find((s) => s.examId === ex.id && s.student === student && student);
          const unread = examType === "today" && !isExamViewed(ex, readIds);
          return (
            <article className="mr-card" key={ex.id} style={{ animationDelay: `${i * 40}ms` }}>
              <div className="mr-notice-head">
                <h3>{unread && <span className="mr-unread-dot" />}{ex.title}</h3>
                <span className="mr-date">{fmtDate(ex.createdAt)}</span>
              </div>
              {!isPublished(ex) && (
                <div className="mr-sched-tag">⏰ 예약됨 · {new Date(ex.publishAt).getMonth() + 1}월 {new Date(ex.publishAt).getDate()}일 공개</div>
              )}
              <div className="mr-exam-meta">
                <span>출제자 {ex.author || "관리자"}{isMine ? " (나)" : ""}</span>
                <span>·</span>
                <span>문항 {ex.questions.length}개</span>
                <span>·</span>
                <span>만점 {maxScore(ex)}점</span>
                <span>·</span>
                <span>제출 {exSubs.length}건</span>
                {pending > 0 && <span className="mr-badge-red">채점 대기 {pending}</span>}
              </div>
              <div className="mr-row-between" style={{ marginTop: "14px" }}>
                <div>
                  {!isMine && (myTake ? (
                    <span className="mr-result-pill">
                      내 점수 {totalScore(ex, myTake)} / {maxScore(ex)}
                    </span>
                  ) : (
                    <button className="mr-btn" onClick={() => { if (onView) onView(ex.id); setTaking(ex); }}>
                      응시하기
                    </button>
                  ))}
                </div>
                <div className="mr-gap">
                  {canEdit && (
                    <button className="mr-btn-ghost" onClick={() => openEdit(ex)}>
                      수정
                    </button>
                  )}
                  {canEdit && (
                    <button className="mr-btn-ghost danger" onClick={() => removeExam(ex)}>
                      삭제
                    </button>
                  )}
                  <button className="mr-btn-ghost" onClick={() => openGrade(ex)}>
                    제출/채점 보기
                  </button>
                </div>
              </div>
            </article>
          );
        })
      )}
    </div>
  );
}

/* ---------- 시험 출제/수정 에디터 ---------- */
function ExamEditor({ initial, defaultType, onCancel, onSave }) {
  function blankQ() {
    return { id: uid(), type: "mc", text: "", image: "", latex: "", mathTree: null, body: [{ id: segId(), type: "text", v: "" }], points: 10, options: ["", ""], answer: 0, accept: "" };
  }
  const [title, setTitle] = useState(initial ? initial.title : "");
  const [examType, setExamType] = useState(initial ? (initial.examType || "level") : (defaultType || "level"));
  const toLocalInput = (ts) => {
    const d = new Date(ts);
    const p = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
  };
  const [scheduled, setScheduled] = useState(initial ? !!initial.publishAt : false);
  const [publishStr, setPublishStr] = useState(initial && initial.publishAt ? toLocalInput(initial.publishAt) : "");
  const [questions, setQuestions] = useState(
    initial && initial.questions && initial.questions.length
      ? initial.questions.map((q) => {
          const m = { options: ["", ""], accept: "", answer: 0, latex: "", mathTree: null, body: null, ...q };
          if (!m.body || !m.body.length) {
            const segs = [];
            if (m.text) segs.push({ id: segId(), type: "text", v: m.text });
            if (m.latex) segs.push({ id: segId(), type: "math", latex: m.latex, tree: m.mathTree || null });
            m.body = segs.length ? segs : null;
          }
          return m;
        })
      : [blankQ()]
  );
  const update = (id, patch) => setQuestions((qs) => qs.map((q) => (q.id === id ? { ...q, ...patch } : q)));
  const addQ = () => setQuestions((qs) => [...qs, blankQ()]);
  const delQ = (id) => setQuestions((qs) => (qs.length > 1 ? qs.filter((q) => q.id !== id) : qs));

  const setOption = (qid, idx, val) =>
    setQuestions((qs) =>
      qs.map((q) => (q.id === qid ? { ...q, options: q.options.map((o, i) => (i === idx ? val : o)) } : q))
    );
  const addOption = (qid) =>
    setQuestions((qs) => qs.map((q) => (q.id === qid ? { ...q, options: [...q.options, ""] } : q)));
  const delOption = (qid, idx) =>
    setQuestions((qs) =>
      qs.map((q) => {
        if (q.id !== qid || q.options.length <= 2) return q;
        const options = q.options.filter((_, i) => i !== idx);
        let answer = q.answer;
        if (answer >= options.length) answer = options.length - 1;
        return { ...q, options, answer };
      })
    );

  const save = () => {
    if (!title.trim()) return alert("시험 제목을 입력하세요.");
    const final = questions.map((q) => ({ ...q, points: Number(q.points) || 0 }));
    for (const q of final) {
      const bodyText = (q.body || []).map((s) => (s.type === "text" ? s.v : s.latex || "")).join("");
      if (!q.image && !bodyText.trim())
        return alert("각 문항에 문제 본문(텍스트·수식) 또는 사진을 넣어주세요.");
      if (q.type === "mc" && q.options.some((o) => !o.trim()))
        return alert("객관식 보기를 모두 입력하세요.");
      if (q.type === "short" && !String(q.accept || "").trim())
        return alert("주관식 문항의 정답을 입력하세요. (자동 채점에 사용됩니다)");
    }
    let publishAt = null;
    if (scheduled) {
      if (!publishStr) return alert("공개 날짜를 선택하세요.");
      const [y, m, d] = publishStr.split("-").map(Number);
      publishAt = new Date(y, m - 1, d, 0, 0, 0, 0).getTime(); // 그 날 자정(00:00)에 공개
      if (isNaN(publishAt)) return alert("공개 날짜가 올바르지 않아요.");
    }
    onSave({ title: title.trim(), examType, publishAt, questions: final });
  };

  return (
    <div className="mr-col">
      <section className="mr-card mr-writer">
        <div className="mr-card-tag">{initial ? "시험 수정" : "시험 출제"}</div>
        <input
          className="mr-input"
          placeholder="시험 제목"
          value={title}
          onChange={(e) => setTitle(e.target.value)}
        />
        <div className="mr-cat-label">종류</div>
        <div className="mr-cat-seg">
          <button className={examType === "level" ? "on" : ""} onClick={() => setExamType("level")}>레벨테스트</button>
          <button className={examType === "today" ? "on" : ""} onClick={() => setExamType("today")}>오늘의 문제</button>
        </div>
        <div className="mr-cat-label">공개 시점</div>
        <div className="mr-cat-seg">
          <button className={!scheduled ? "on" : ""} onClick={() => setScheduled(false)}>즉시 공개</button>
          <button className={scheduled ? "on" : ""} onClick={() => setScheduled(true)}>예약 공개</button>
        </div>
        {scheduled && (
          <>
            <input
              className="mr-input"
              type="date"
              value={publishStr}
              onChange={(e) => setPublishStr(e.target.value)}
            />
            <p className="mr-sched-hint">선택한 날짜의 자정(00:00)부터 학생·비회원에게 공개돼요. 그 전까지는 관리자에게만 보여요.</p>
          </>
        )}
      </section>

      {questions.map((q, qi) => (
        <section className="mr-card mr-qedit" key={q.id}>
          <div className="mr-qedit-head">
            <span className="mr-qnum">Q{qi + 1}</span>
            <div className="mr-seg">
              <button className={q.type === "mc" ? "on" : ""} onClick={() => update(q.id, { type: "mc" })}>
                객관식
              </button>
              <button
                className={q.type === "short" ? "on" : ""}
                onClick={() => update(q.id, { type: "short" })}
              >
                주관식
              </button>
            </div>
            <label className="mr-points">
              배점
              <input
                type="number"
                min={0}
                value={q.points}
                onChange={(e) => update(q.id, { points: e.target.value })}
              />
            </label>
            <button className="mr-link-del" onClick={() => delQ(q.id)}>
              삭제
            </button>
          </div>

          <QuestionImage value={q.image} onChange={(img) => update(q.id, { image: img })} />
          <div className="mr-cat-label">문제 본문 (텍스트 + 수식)</div>
          <RichBody value={q.body} onChange={(body) => update(q.id, { body })} />

          {q.type === "mc" ? (
            <div className="mr-options">
              {q.options.map((opt, oi) => (
                <div className="mr-opt-row" key={oi}>
                  <input
                    type="radio"
                    name={`ans-${q.id}`}
                    checked={q.answer === oi}
                    onChange={() => update(q.id, { answer: oi })}
                    title="정답으로 지정"
                  />
                  <span className="mr-opt-label">{String.fromCharCode(9311 + oi + 1)}</span>
                  <input
                    className="mr-input mr-opt-input"
                    placeholder={`보기 ${oi + 1}`}
                    value={opt}
                    onChange={(e) => setOption(q.id, oi, e.target.value)}
                  />
                  {q.options.length > 2 && (
                    <button className="mr-x" onClick={() => delOption(q.id, oi)}>
                      ×
                    </button>
                  )}
                </div>
              ))}
              <button className="mr-add-opt" onClick={() => addOption(q.id)}>
                + 보기 추가
              </button>
              <div className="mr-hint">왼쪽 ○ 를 눌러 정답을 지정하세요.</div>
            </div>
          ) : (
            <div className="mr-short-answer">
              <input
                className="mr-input"
                placeholder="정답"
                value={q.accept || ""}
                onChange={(e) => update(q.id, { accept: e.target.value })}
              />
            </div>
          )}
        </section>
      ))}

      <div className="mr-row-between">
        <button className="mr-btn-ghost" onClick={addQ}>
          + 문항 추가
        </button>
        <div className="mr-gap">
          <button className="mr-btn-text" onClick={onCancel}>
            취소
          </button>
          <button className="mr-btn" onClick={save}>
            {initial ? "수정 완료" : "시험 저장"}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ---------- 관리자: 채점 패널 ---------- */
function GradePanel({ exam, subs, guestSubs, users, onBack, onSaveGrade }) {
  const [openId, setOpenId] = useState(null);
  const guests = guestSubs || [];

  return (
    <div className="mr-col">
      <button className="mr-btn-text" onClick={onBack}>
        ← 시험 목록
      </button>
      <section className="mr-card">
        <div className="mr-notice-head">
          <h3>{exam.title}</h3>
          <span className="mr-date">만점 {maxScore(exam)}점</span>
        </div>
      </section>

      <section className="mr-card">
        <div className="mr-card-tag">문항별 통계</div>
        <div className="mr-qrate-sub" style={{ marginBottom: "10px" }}>
          회원 응시 {subs.length}명 · 비회원 참여 {guests.length}명
        </div>
        <div className="mr-qrate-list">
          {exam.questions.map((q, qi) => {
            const mTotal = subs.length;
            const mCorrect = subs.filter((s) => isQCorrect(q, s)).length;
            const mRate = mTotal ? Math.round((100 * mCorrect) / mTotal) : null;
            const gTotal = guests.length;
            const gWrong = guests.filter((s) => !isQCorrect(q, s)).length;
            const gWrongRate = gTotal ? Math.round((100 * gWrong) / gTotal) : null;
            return (
              <div className="mr-qrate-row" key={q.id}>
                <span className="mr-qnum-sm">Q{qi + 1}</span>
                <span className="mr-qrate-val" style={{ color: rateColor(mRate) }}>회원정답률 {mTotal ? mRate + "%" : "—"}</span>
                <span className="mr-qrate-wrong">비회원 오답률 {gTotal ? gWrongRate + "%" : "—"}</span>
              </div>
            );
          })}
        </div>
      </section>

      {subs.length === 0 ? (
        <Empty text="아직 제출된 답안이 없어요." />
      ) : (
        subs.map((s) => (
          <SubmissionRow
            key={s.id}
            exam={exam}
            sub={s}
            users={users}
            open={openId === s.id}
            onToggle={() => setOpenId(openId === s.id ? null : s.id)}
            onSaveGrade={onSaveGrade}
          />
        ))
      )}
    </div>
  );
}

function SubmissionRow({ exam, sub, users, open, onToggle, onSaveGrade }) {
  const [manual, setManual] = useState(sub.manualScores || {});
  useEffect(() => setManual(sub.manualScores || {}), [sub]);

  const save = () => {
    const cleaned = {};
    exam.questions
      .filter((q) => q.type === "short")
      .forEach((q) => {
        const raw = manual[q.id];
        if (raw === undefined || raw === null || raw === "") return;
        cleaned[q.id] = Math.max(0, Math.min(Number(q.points) || 0, Number(raw) || 0));
      });
    onSaveGrade({ ...sub, manualScores: cleaned, graded: true });
  };

  const auto = autoScore(exam, sub.answers);
  const total = totalScore(exam, { ...sub, manualScores: manual });

  return (
    <article className="mr-card mr-sub">
      <div className="mr-sub-head" onClick={onToggle}>
        <div className="mr-sub-name">
          <span className="mr-avatar">{(sub.student || "?")[0]}</span>
          <div>
            <div className="mr-strong">{studentName(sub.student, users)}</div>
            <div className="mr-date">{fmtDate(sub.submittedAt)}</div>
          </div>
        </div>
        <div className="mr-sub-score">
          {sub.graded ? (
            <span className="mr-score-done">
              {totalScore(exam, sub)} / {maxScore(exam)}
            </span>
          ) : (
            <span className="mr-badge-red">채점 대기</span>
          )}
          <span className="mr-chevron">{open ? "▲" : "▼"}</span>
        </div>
      </div>

      {open && (
        <div className="mr-sub-body">
          {exam.questions.map((q, qi) => {
            const a = sub.answers[q.id];
            if (q.type === "mc") {
              const correct = a === q.answer;
              return (
                <div className="mr-grade-q" key={q.id}>
                  <div className="mr-grade-qtext">
                    <span className="mr-qnum-sm">Q{qi + 1}</span>
                  </div>
                  {q.image && <img className="mr-q-img sm" src={q.image} alt="문제" />}
                  <QBody q={q} />
                  <div className="mr-mc-review">
                    {q.options.map((opt, oi) => (
                      <div
                        key={oi}
                        className={
                          "mr-mc-opt" +
                          (oi === q.answer ? " is-answer" : "") +
                          (oi === a && oi !== q.answer ? " is-wrong" : "")
                        }
                      >
                        {String.fromCharCode(9311 + oi + 1)} {opt}
                        {oi === q.answer && <span className="mr-tag-correct">정답</span>}
                        {oi === a && <span className="mr-tag-chosen">선택</span>}
                      </div>
                    ))}
                  </div>
                  <div className={"mr-auto-mark " + (correct ? "ok" : "no")}>
                    {correct ? `정답 +${q.points}점` : `오답 0점`} (자동)
                  </div>
                </div>
              );
            }
            const scorrect = isShortCorrect(q, a);
            const overridden = manual[q.id] !== undefined && manual[q.id] !== null && manual[q.id] !== "";
            return (
              <div className="mr-grade-q" key={q.id}>

                </div>
                {q.image && <img className="mr-q-img sm" src={q.image} alt="문제" />}

                <div className="mr-answer-box">

                <div className="mr-accept">

                <div className={"mr-auto-mark " + (scorrect ? "ok" : "no")}>
                  {scorrect ? `정답 +${q.points}점` : `오답 0점`} (자동)
                </div>
                <label className="mr-manual">
                  점수 보정
                  <input
                    type="number"
                    min={0}
                    max={q.points}
                    placeholder={String(scorrect ? q.points : 0)}
                    value={manual[q.id] ?? ""}
                    onChange={(e) => setManual({ ...manual, [q.id]: e.target.value })}
                  />
                  <span className="mr-muted">/ {q.points}점</span>
                  {overridden && (
                    <button className="mr-reset" onClick={() => setManual({ ...manual, [q.id]: "" })}>
                      자동으로
                    </button>
                  )}
                </label>
              </div>
            );
          })}
          <div className="mr-row-between mr-grade-foot">
            <span className="mr-muted">
              자동 채점 {auto}점{total !== auto ? ` → 보정 후 ${total}점` : ""} ·{" "}
              <strong className="mr-ink">최종 {total}점</strong> / {maxScore(exam)}점
            </span>
