.mr-btn{
  border:0; background:var(--blue); color:#fff; padding:12px 20px; border-radius:13px;
  font-family:inherit; font-weight:700; font-size:15px; cursor:pointer; transition:background .15s,transform .08s;
}
.mr-btn:hover{background:var(--blue-d)}
.mr-btn:active{transform:scale(.98)}
.mr-btn-ghost{
  border:0; background:var(--blue-bg); color:var(--blue); padding:11px 18px; border-radius:13px;
  font-family:inherit; font-weight:700; font-size:14.5px; cursor:pointer; transition:background .15s;
}
.mr-btn-ghost:hover{background:#DBEAFE}
.mr-btn-ghost.danger{background:var(--red-bg); color:var(--red)}
.mr-btn-ghost.danger:hover{background:#FBD5DA}
.mr-btn-text{border:0; background:none; color:var(--t2); cursor:pointer; font-family:inherit; font-size:14.5px; font-weight:700; align-self:flex-start; padding:4px 0}
.mr-row-end{display:flex; justify-content:flex-end; margin-top:14px}
.mr-row-between{display:flex; justify-content:space-between; align-items:center; gap:10px}
.mr-gap{display:flex; gap:8px; align-items:center}

/* exam editor */
.mr-qedit-head{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:4px}
.mr-qnum{font-weight:800; color:var(--blue); font-size:16px}
.mr-qnum-sm{font-weight:800; color:var(--blue); margin-right:5px}
.mr-seg{display:flex; background:var(--bg); border-radius:9px; padding:3px; gap:2px}
.mr-seg button{border:0; background:transparent; padding:6px 13px; font-size:13px; cursor:pointer; font-family:inherit; color:var(--t3); font-weight:700; border-radius:7px; transition:all .15s}
.mr-seg button.on{background:#fff; color:var(--t1); box-shadow:0 1px 2px rgba(0,0,0,.08)}
.mr-points{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--t3); font-weight:600; margin-left:auto}
.mr-points input{width:60px; border:none; background:var(--bg); border-radius:8px; padding:7px 9px; font-family:inherit; font-weight:700; color:var(--t1)}
.mr-points input:focus{outline:2px solid var(--blue); outline-offset:-1px}
.mr-options{margin-top:12px; display:flex; flex-direction:column; gap:8px}
.mr-opt-row{display:flex; align-items:center; gap:9px}
.mr-opt-row input[type=radio]{width:18px; height:18px; accent-color:var(--blue); flex:none}
.mr-opt-label{font-size:15px; color:var(--t3); width:18px; text-align:center; flex:none}
.mr-opt-input{margin-top:0; flex:1; padding:10px 12px}
.mr-x{border:0; background:var(--bg); color:var(--t3); width:30px; height:30px; border-radius:9px; cursor:pointer; font-size:17px; flex:none}
.mr-x:hover{background:var(--red-bg); color:var(--red)}
.mr-add-opt{align-self:flex-start; border:0; background:var(--bg); color:var(--t2); padding:8px 14px; border-radius:9px; cursor:pointer; font-family:inherit; font-size:13.5px; font-weight:700}
.mr-add-opt:hover{background:var(--blue-bg); color:var(--blue)}
.mr-hint{font-size:12.5px; color:var(--t3); margin-top:9px; line-height:1.5}

/* submissions / grading */
.mr-sub{padding:0; overflow:hidden}
.mr-sub-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; cursor:pointer}
.mr-sub-name{display:flex; align-items:center; gap:11px}
.mr-avatar{width:38px; height:38px; border-radius:50%; background:var(--blue-bg); color:var(--blue); display:grid; place-items:center; font-weight:800; flex:none}
.mr-strong{font-weight:700; font-size:14.5px}
.mr-sub-score{display:flex; align-items:center; gap:10px}
.mr-score-done{font-weight:800; color:var(--green); font-size:15px}
.mr-chevron{font-size:9px; color:var(--t3)}
.mr-badge-red{background:var(--red-bg); color:var(--red); font-size:12px; font-weight:700; padding:5px 10px; border-radius:20px; white-space:nowrap}
.mr-sub-body{border-top:1px solid var(--line-soft); padding:6px 20px 18px}
.mr-grade-q{padding:14px 0; border-bottom:1px solid var(--line-soft)}
.mr-grade-q:last-of-type{border-bottom:0}
.mr-grade-qtext{font-size:15px; line-height:1.55; font-weight:600}

/* 칼럼 읽기 */
.mr-title-input{font-size:18px; font-weight:800}

/* 칼럼 게시판 */
.mr-list-top{display:flex; align-items:center; justify-content:space-between; padding:6px 2px 4px}
.mr-list-title{font-size:22px; font-weight:800; letter-spacing:-0.5px; color:var(--t1)}
.mr-postlist{background:var(--card); border-radius:20px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.03)}
.mr-post-row{
  display:flex; flex-direction:column; gap:5px; width:100%; text-align:left; background:transparent;
  border:0; border-bottom:1px solid var(--line-soft); padding:17px 18px; cursor:pointer;
  font-family:inherit; transition:background .12s; animation:rise .35s cubic-bezier(.2,.7,.3,1) both;
}
.mr-post-row:last-child{border-bottom:0}
.mr-post-row:hover{background:var(--bg)}
.mr-post-row:active{background:var(--bg)}
.mr-post-row-title{font-size:15.5px; font-weight:700; color:var(--t1); letter-spacing:-0.3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.mr-post-row-meta{font-size:12.5px; color:var(--t3); font-weight:600}
.mr-draft-head{font-size:13px; font-weight:800; color:var(--t3); padding:2px 2px 0}
.mr-draft-badge{font-size:11px; font-weight:700; color:#B26A00; background:#FFF4E0; padding:2px 7px; border-radius:6px; margin-left:8px; vertical-align:middle}
.mr-cat-label{font-size:12.5px; font-weight:700; color:var(--t2); margin-top:14px}
.mr-cat-seg{display:flex; gap:4px; background:var(--bg); border-radius:11px; padding:4px; margin-top:8px}
.mr-cat-seg button{flex:1; border:0; background:transparent; padding:9px; font-family:inherit; font-weight:700; font-size:13.5px; color:var(--t3); border-radius:8px; cursor:pointer; transition:all .15s}
.mr-cat-seg button.on{background:#fff; color:var(--t1); box-shadow:0 1px 3px rgba(0,0,0,.08)}
.mr-post-item{display:flex; align-items:stretch; border-bottom:1px solid var(--line-soft)}
.mr-post-item:last-child{border-bottom:0}
.mr-post-item .mr-post-row{border-bottom:0; flex:1; min-width:0}
.mr-reorder{display:flex; flex-direction:column; justify-content:center; gap:3px; padding:0 12px; flex:none}
.mr-reorder button{border:0; background:var(--bg); color:var(--t2); width:30px; height:22px; border-radius:6px; cursor:pointer; font-size:10px; line-height:1; font-family:inherit}
.mr-reorder button:disabled{opacity:.3; cursor:default}
.mr-reorder button:hover:not(:disabled){background:var(--blue-bg); color:var(--blue)}
.mr-qrate-list{display:flex; flex-direction:column}
.mr-qrate-row{display:flex; align-items:center; gap:9px; padding:11px 0; border-bottom:1px solid var(--line-soft)}
.mr-qrate-row:last-child{border-bottom:0}
.mr-qrate-val{font-size:14px; font-weight:800; color:var(--blue)}
.mr-qrate-sub{font-size:12.5px; color:var(--t3); font-weight:600; margin-left:auto}
.mr-qrate-wrong{font-size:13px; font-weight:700; color:var(--red); margin-left:auto}

/* 칼럼 상세 */
.mr-post-title{font-size:23px; font-weight:800; line-height:1.4; letter-spacing:-0.5px}
.mr-post-byline{display:flex; align-items:center; gap:8px; margin-top:13px; font-size:13px; color:var(--t2); font-weight:600}
.mr-avatar.sm{width:26px; height:26px; font-size:12px}
.mr-post-divider{height:1px; background:var(--line-soft); margin:16px 0}
.mr-notice .mr-notice-head h3{font-size:20px; line-height:1.4}
.mr-notice-body{font-size:15.5px; line-height:1.85; color:#333D4B; margin-top:12px}

/* 문제 사진 업로드 */
.mr-img-drop{
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  margin-top:12px; padding:26px 16px; background:var(--bg); border:2px dashed #D1D6DB;
  border-radius:14px; cursor:pointer; text-align:center; transition:all .15s;
}
.mr-img-drop:hover{border-color:var(--blue); background:var(--blue-bg)}
.mr-img-icon{font-size:26px}
.mr-img-main{font-size:14.5px; font-weight:700; color:var(--t1)}
.mr-img-sub{font-size:12px; color:var(--t3)}
.mr-img-preview{margin-top:12px; display:flex; flex-direction:row; flex-wrap:wrap; align-items:center; gap:8px}
.mr-img-preview > img{width:100%; border-radius:14px; display:block}
.mr-img-change,.mr-img-del{
  display:inline-block; font-size:13px; font-weight:700; padding:7px 13px; border-radius:9px;
  cursor:pointer; border:0; font-family:inherit;
}
.mr-img-change{background:var(--blue-bg); color:var(--blue)}
.mr-img-del{background:var(--bg); color:var(--t3)}
.mr-img-del:hover{background:var(--red-bg); color:var(--red)}

/* 출제된 문제 사진 표시 */
.mr-q-img{width:100%; border-radius:13px; margin-top:10px; display:block; background:var(--bg)}
.mr-q-img.sm{margin-top:8px}
.mr-q-cap{margin-top:8px; font-size:14px; color:var(--t2); line-height:1.55}
.mr-short-answer{margin-top:12px}
.mr-ans-label{display:block; font-size:11.5px; font-weight:700; color:var(--t3); margin-bottom:4px}
.mr-accept{margin-top:8px; font-size:13.5px; color:var(--t2)}
.mr-accept strong{color:var(--green); font-weight:700}
.mr-reset{border:0; background:var(--bg); color:var(--t3); font-size:12px; font-weight:700; padding:5px 10px; border-radius:8px; cursor:pointer; font-family:inherit}
.mr-reset:hover{background:var(--blue-bg); color:var(--blue)}
.mr-mc-review{margin-top:10px; display:flex; flex-direction:column; gap:6px}
.mr-mc-opt{font-size:13.5px; padding:9px 12px; border-radius:10px; background:var(--bg); display:flex; align-items:center; gap:8px; color:var(--t2)}
.mr-mc-opt.is-answer{background:var(--green-bg); color:var(--green); font-weight:700}
.mr-mc-opt.is-wrong{background:var(--red-bg); color:var(--red); font-weight:700}
.mr-tag-correct{font-size:11px; background:var(--green); color:#fff; padding:2px 7px; border-radius:5px; margin-left:auto; font-weight:700}
.mr-tag-chosen{font-size:11px; border:1px solid currentColor; padding:2px 7px; border-radius:5px; font-weight:700}
.mr-auto-mark{margin-top:8px; font-size:12.5px; font-weight:700}
.mr-auto-mark.ok{color:var(--green)} .mr-auto-mark.no{color:var(--red)}
.mr-answer-box{margin-top:10px; background:var(--bg); border-radius:12px; padding:12px 14px; line-height:1.6; white-space:pre-wrap; font-size:14.5px; color:var(--t1)}
.mr-manual{display:flex; align-items:center; gap:8px; margin-top:12px; font-size:13.5px; color:var(--t3); font-weight:600}
.mr-manual input{width:66px; border:none; background:var(--blue-bg); border-radius:9px; padding:8px 10px; font-family:inherit; color:var(--blue); font-weight:800; text-align:center}
.mr-manual input:focus{outline:2px solid var(--blue); outline-offset:-1px}
.mr-muted{color:var(--t3)} .mr-ink{color:var(--t1)}
.mr-grade-foot{margin-top:16px; font-size:13.5px; color:var(--t2); font-weight:600}

/* take exam */
.mr-pts-tag{font-size:12px; color:var(--t3); margin-left:8px; background:var(--bg); padding:3px 9px; border-radius:20px; font-weight:700}
.mr-rate-tag{font-size:12px; color:var(--blue); margin-left:6px; background:var(--bg); padding:3px 9px; border-radius:20px; font-weight:700}
.mr-take-options{margin-top:14px; display:flex; flex-direction:column; gap:9px}
.mr-take-opt{display:flex; align-items:center; gap:10px; padding:14px; background:var(--bg); border-radius:13px; cursor:pointer; font-size:14.5px; font-weight:600; transition:all .15s; border:2px solid transparent}
.mr-take-opt.review{cursor:default}
.mr-take-opt.review.ans{border-color:var(--green); background:var(--green-bg)}
.mr-take-opt.review.mychoice{border-color:var(--red); background:var(--red-bg)}
.mr-opt-flag{margin-left:auto; font-size:11px; font-weight:800; padding:2px 9px; border-radius:7px}
.mr-opt-flag.ans{color:var(--green); background:#fff}
.mr-opt-flag.mine{color:var(--red); background:#fff}
.mr-ox{font-size:12px; font-weight:800; padding:3px 11px; border-radius:20px; margin-left:6px}
.mr-ox.o{color:var(--green); background:var(--green-bg)}
.mr-ox.x{color:var(--red); background:var(--red-bg)}
.mr-take-q.wrong{border-left:3px solid var(--red)}
.mr-short-review{margin-top:12px; display:flex; flex-direction:column; gap:8px}
.mr-sr-row{display:flex; gap:10px; align-items:center}
.mr-sr-k{font-size:12px; font-weight:700; color:var(--t3); width:44px; flex:none}
.mr-sr-v{font-size:14.5px; font-weight:700; color:var(--t1)}
.mr-sr-v.ok{color:var(--green)}
.mr-sr-v.no{color:var(--red)}
.mr-take-opt.sel{background:var(--blue-bg); border-color:var(--blue); color:var(--blue); font-weight:700}
.mr-take-opt input{width:18px; height:18px; accent-color:var(--blue); flex:none}
.mr-result-pill{font-weight:800; color:var(--green); background:var(--green-bg); padding:9px 15px; border-radius:11px; font-size:14.5px}
.mr-guest-note{background:var(--red-bg); color:var(--red); font-size:13.5px; font-weight:700; padding:12px 14px; border-radius:12px; text-align:center; line-height:1.5}

.mr-foot{
  max-width:680px; margin:28px auto 0; padding:0 22px;
  display:flex; justify-content:center; align-items:center; gap:8px;
  font-size:12px; color:var(--t3); line-height:1.6; font-weight:500;
}
.mr-foot-link{background:none; border:0; color:var(--t2); font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; text-decoration:underline; padding:4px}
.mr-foot-link:hover{color:var(--blue)}
.mr-foot-sep{color:var(--t3)}
.mr-foot-copy{}
.mr-pp-title{font-size:21px; font-weight:800; color:var(--t1); letter-spacing:-0.5px; padding-bottom:12px; border-bottom:2px solid var(--t1); margin:0 0 14px}
.mr-pp-intro{font-size:13.5px; color:var(--t2); line-height:1.7; margin:0}
.mr-pp-h2{font-size:16px; font-weight:800; color:var(--blue); margin:26px 0 9px; letter-spacing:-0.3px}
.mr-pp p{font-size:13.5px; color:var(--t2); line-height:1.7; margin:0 0 6px}
.mr-pp-ul{margin:6px 0 4px; padding-left:18px}
.mr-pp-ul li{font-size:13.5px; color:var(--t2); line-height:1.65; margin:6px 0}
.mr-pp-table{width:100%; border-collapse:collapse; margin:12px 0; font-size:12.5px}
.mr-pp-table th,.mr-pp-table td{border:1px solid var(--line); padding:9px 10px; text-align:left; vertical-align:top; color:var(--t2); line-height:1.5}
.mr-pp-table th{background:var(--bg); color:var(--t1); font-weight:700}
.mr-pp-note{background:var(--bg); border-radius:14px; padding:16px; margin:16px 0}
.mr-pp-note-tag{display:inline-block; font-size:11px; font-weight:800; color:var(--blue); background:var(--blue-bg); padding:4px 10px; border-radius:8px; margin-bottom:9px; letter-spacing:-0.2px}
.mr-pp-note p{font-size:13px; color:var(--t2); line-height:1.7; margin:0}
.mr-pp a{color:var(--blue); font-weight:700; text-decoration:underline}
.mr-consent{display:flex; align-items:flex-start; gap:9px; margin:4px 2px 2px; font-size:13px; color:var(--t2); line-height:1.5; cursor:pointer}
.mr-consent input{margin-top:2px; flex:none; width:16px; height:16px; accent-color:var(--blue)}
.mr-consent-link{background:none; border:0; padding:0; font:inherit; color:var(--blue); font-weight:700; text-decoration:underline; cursor:pointer}
.mr-policy-modal{background:var(--card); border-radius:20px; width:100%; max-width:560px; max-height:84vh; display:flex; flex-direction:column; overflow:hidden}
.mr-policy-head{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line-soft); flex:none}
.mr-policy-scroll{overflow-y:auto; padding:16px}
.mr-policy-scroll .mr-card{box-shadow:none; padding:0}
`;

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
